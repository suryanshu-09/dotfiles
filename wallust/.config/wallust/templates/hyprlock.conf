$text_color = rgba({{color7 | strip}}FF)
$entry_background_color = rgba({{color0 | strip}}99)
$entry_border_color = rgba({{color4 | strip}}FF)
$entry_color = rgba({{color7 | strip}}FF)
$check_color = rgba({{color2 | strip}}FF)
$fail_color = rgba({{color1 | strip}}FF)
$caps_color = rgba({{color3 | strip}}FF)
$font_family = JetBrainsMono Nerd Font
$font_family_clock = JetBrainsMono Nerd Font Bold


general {
    grace = 2
    hide_cursor = true
    ignore_empty_input = true
}


background {
    monitor =
    path = {{wallpaper}}
    blur_size = 8
    blur_passes = 3
    brightness = 0.4
    contrast = 1.0
    vibrancy = 0.3
    vibrancy_darkness = 0.6
}

# Main input field
input-field {
    monitor =
    size = 350, 60
    outline_thickness = 3
    dots_size = 0.25
    dots_spacing = 0.35
    dots_center = true
    dots_rounding = -1
    outer_color = $entry_border_color
    inner_color = $entry_background_color
    font_color = $entry_color
    fade_on_empty = false
    fade_timeout = 2000
    placeholder_text = <span foreground="##{{color4 | strip}}"><i>󰌾 Enter Password</i></span>
    hide_input = false
    check_color = $check_color
    fail_color = $fail_color
    fail_text = <span foreground="##{{color1 | strip}}"><i>$FAIL ($ATTEMPTS)</i></span>
    capslock_color = $caps_color
    position = 0, -150
    halign = center
    valign = center
}

# Clock
label {
    monitor =
    text = cmd[update:1000] echo "<span foreground='##{{color7 | strip}}'>$(date +"%H:%M:%S")</span>"
    color = $text_color
    font_size = 90
    font_family = $font_family_clock
    position = 0, 250
    halign = center
    valign = center
    shadow_passes = 2
    shadow_size = 3
    shadow_color = rgba(0, 0, 0, 0.5)
}

# Date
label {
    monitor =
    text = cmd[update:1000] echo "<span foreground='##{{color4 | strip}}'>$(date +"%A, %B %d, %Y")</span>"
    color = rgba({{color4 | strip}}FF)
    font_size = 22
    font_family = $font_family
    position = 0, 150
    halign = center
    valign = center
    shadow_passes = 2
    shadow_size = 3
}

# User info
label {
    monitor =
    text =   $USER
    color = rgba({{color7 | strip}}CC)
    font_size = 16
    font_family = $font_family
    position = 0, -240
    halign = center
    valign = center
}

# Lock icon
label {
    monitor =
    text = 󰌾
    color = rgba({{color4 | strip}}CC)
    font_size = 40
    font_family = $font_family
    position = 0, 50
    halign = center
    valign = center
    shadow_passes = 2
}

# Status/hint text
label {
    monitor =
    text = Press any key to unlock
    color = rgba({{color7 | strip}}80)
    font_size = 12
    font_family = $font_family
    position = 0, -300
    halign = center
    valign = center
}

# Battery status
label {
    monitor =
    text = cmd[update:5000] if command -v acpi &> /dev/null; then echo "󰁹 $(acpi -b | grep -oP '\d+(?=%)' | head -1)%"; fi
    color = rgba({{color2 | strip}}CC)
    font_size = 14
    font_family = $font_family
    position = 30, 30
    halign = left
    valign = bottom
}

# Network status
label {
    monitor =
    text = cmd[update:5000] if command -v nmcli &> /dev/null; then nmcli -t -f active,ssid dev wifi | grep '^yes' | cut -d: -f2 | head -1 | awk '{if($0) print "󰤨 " $0; else print "󰤭 Disconnected"}'; else echo ""; fi
    color = rgba({{color6 | strip}}CC)
    font_size = 14
    font_family = $font_family
    position = -30, 30
    halign = right
    valign = bottom
}
