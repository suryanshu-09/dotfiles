$text_color = rgba(FFFFFFFF)
$entry_background_color = rgba(2a2a2c99)
$entry_border_color = rgba(c59edcFF)
$entry_color = rgba(FFFFFFFF)
$check_color = rgba(c3fb5bFF)
$fail_color = rgba(ff6e79FF)
$caps_color = rgba(ffb86cFF)
$font_family = JetBrainsMono Nerd Font
$font_family_clock = JetBrainsMono Nerd Font Bold


general {
    grace = 2
    hide_cursor = true
    ignore_empty_input = true
}


background {
    monitor =
    path = /home/subah/Pictures/Pinterest/rivendell-the-lord-of-the-rings-fantasy-art-waterfall-artwork-hd-wallpaper-preview.jpg
    blur_size = 8
    blur_passes = 3
    brightness = 0.4
    contrast = 1.0
    vibrancy = 0.3
    vibrancy_darkness = 0.6
}

# Main input field
input-field {
    monitor =
    size = 350, 60
    outline_thickness = 3
    dots_size = 0.25
    dots_spacing = 0.35
    dots_center = true
    dots_rounding = -1
    outer_color = $entry_border_color
    inner_color = $entry_background_color
    font_color = $entry_color
    fade_on_empty = false
    fade_timeout = 2000
    placeholder_text = <span foreground="##c3fb5b"><i>󰌾 Enter Password</i></span>
    hide_input = false
    check_color = $check_color
    fail_color = $fail_color
    fail_text = <span foreground="##ff6e79"><i>$FAIL ($ATTEMPTS)</i></span>
    capslock_color = $caps_color
    position = 0, -150
    halign = center
    valign = center
}

# Clock
label {
    monitor =
    text = cmd[update:1000] echo "<span foreground='##c59edc'>$(date +"%H:%M:%S")</span>"
    color = $text_color
    font_size = 90
    font_family = $font_family_clock
    position = 0, 250
    halign = center
    valign = center
}

# Date
label {
    monitor =
    text = cmd[update:1000] echo "<span foreground='##c3fb5b'>$(date +"%A, %B %d, %Y")</span>"
    color = rgba(c3fb5bFF)
    font_size = 22
    font_family = $font_family
    position = 0, 150
    halign = center
    valign = center
}

# Battery status
label {
    monitor =
    text = cmd[update:5000] if [ -f /sys/class/power_supply/BAT0/capacity ]; then echo "󰁹 $(cat /sys/class/power_supply/BAT0/capacity)%"; elif command -v acpi &> /dev/null; then echo "󰁹 $(acpi -b | grep -oP '\d+(?=%)' | head -1)%"; else echo ""; fi
    color = rgba(c59edcCC)
    font_size = 14
    font_family = $font_family
    position = 30, 30
    halign = left
    valign = bottom
}

# Network status
label {
    monitor =
    text = cmd[update:5000] if command -v nmcli &> /dev/null; then nmcli -t -f active,ssid dev wifi | grep '^yes' | cut -d: -f2 | head -1 | awk '{if($0) print "󰤨 " $0; else print "󰤭 Disconnected"}'; else echo ""; fi
    color = rgba(c59edcCC)
    font_size = 14
    font_family = $font_family
    position = -30, 30
    halign = right
    valign = bottom
}
